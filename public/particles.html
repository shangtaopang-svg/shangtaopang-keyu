<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 粒子系统 - 手势控制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: -apple-system, 'SF Pro', sans-serif; color: #fff; }
canvas { display: block; }

.ui-panel {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
  padding: 8px 14px; z-index: 10; user-select: none;
  max-width: 90vw;
}
.ui-panel button {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5); padding: 6px 14px; border-radius: 8px;
  cursor: pointer; font-size: 0.75rem; font-family: inherit;
  transition: all 0.2s; white-space: nowrap;
}
.ui-panel button:hover { background: rgba(255,255,255,0.08); color: #fff; }
.ui-panel button.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
.ui-panel .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); margin: 0 4px; }
.ui-panel .status { font-size: 0.7rem; color: rgba(255,255,255,0.3); white-space: nowrap; }
.dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.dot.green { background: #34d399; }
.dot.yellow { background: #fbbf24; }
.dot.red { background: #ef4444; }

.hint {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.75rem; color: rgba(255,255,255,0.15); z-index: 10;
  text-align: center; pointer-events: none; transition: opacity 1s;
}
</style>
</head>
<body>

<div class="hint" id="hint">🖱️ 按住鼠标 · 粒子飞散 · 松开 · 聚拢成形</div>

<div class="ui-panel">
  <button class="active" data-shape="char">庞</button>
  <button data-shape="heart">❤️</button>
  <button data-shape="sphere">🌐</button>
  <button data-shape="cube">📦</button>
  <div class="sep"></div>
  <button id="fullscreenBtn">⛶ 全屏</button>
  <div class="sep"></div>
  <span class="status" id="status"><span class="dot yellow"></span>加载中...</span>
  <button id="camBtn" style="display:none;font-size:0.65rem;padding:4px 10px">📷 重试</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ===== 配置 =====
const N = 20000;
const SPREAD_R = 16;
const LERP_SPEED = 0.025;
let shape = 'char';
let fist = false;
let t = 0;

// ===== 场景 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 5.5);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 1);
document.body.prepend(renderer.domElement);

// ===== 从文字生成粒子坐标 =====
function textToPoints(char, count) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  c.width = 300; c.height = 300;
  // 白底黑字获取高对比度
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 300, 300);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 220px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char, 150, 158);

  const img = ctx.getImageData(0, 0, 300, 300);
  const data = img.data;
  const pixels = [];
  const step = 2;
  for (let y = 0; y < 300; y += step) {
    for (let x = 0; x < 300; x += step) {
      const i = (y * 300 + x) * 4;
      // 白色像素 = 文字区域
      if (data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) {
        pixels.push({ x: (x-150)/100, y: -(y-150)/100 });
      }
    }
  }

  const pos = new Float32Array(count * 3);
  if (pixels.length === 0) {
    // 降级：生成一个粗略的庞字
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI*2;
      const r = Math.random() * 1.5;
      pos[i*3] = Math.cos(a)*r; pos[i*3+1] = Math.sin(a)*r; pos[i*3+2] = (Math.random()-0.5)*0.5;
    }
    return pos;
  }

  for (let i = 0; i < count; i++) {
    const p = pixels[Math.floor(Math.random() * pixels.length)];
    pos[i*3] = p.x + (Math.random()-0.5)*0.01;
    pos[i*3+1] = p.y + (Math.random()-0.5)*0.01;
    pos[i*3+2] = 0;
  }
  return pos;
}

function getShape(shape, count) {
  if (shape === 'char') {
    return textToPoints('庞', count);
  }

  const pos = new Float32Array(count * 3);
  const sp = 0.03;
  switch (shape) {
    case 'heart':
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = 1.6 * Math.sqrt(Math.abs(Math.sin(a))) / 1.4;
        pos[i*3] = r * Math.sin(a) * 0.9 + (Math.random()-0.5)*sp;
        pos[i*3+1] = -r * Math.cos(a) * 0.9 + 0.2 + (Math.random()-0.5)*sp;
        pos[i*3+2] = (Math.random()-0.5)*0.4;
      }
      break;
    case 'sphere':
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2*Math.random()-1);
        const r = 1.5 * Math.cbrt(Math.random());
        pos[i*3] = r*Math.sin(phi)*Math.cos(theta) + (Math.random()-0.5)*sp;
        pos[i*3+1] = r*Math.cos(phi) + (Math.random()-0.5)*sp;
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta) + (Math.random()-0.5)*sp;
      }
      break;
    case 'cube':
      for (let i = 0; i < count; i++) {
        const s = 1.5;
        const f = Math.floor(Math.random()*6);
        let x=0,y=0,z=0;
        const p = (Math.random()-0.5)*s;
        const q = (Math.random()-0.5)*s;
        if (f===0||f===1) { x = f===0?s/2:-s/2; y=p; z=q; }
        else if (f===2||f===3) { y = f===2?s/2:-s/2; x=p; z=q; }
        else { z = f===4?s/2:-s/2; x=p; y=q; }
        pos[i*3] = x + (Math.random()-0.5)*0.03;
        pos[i*3+1] = y + (Math.random()-0.5)*0.03;
        pos[i*3+2] = z + (Math.random()-0.5)*0.03;
      }
      break;
  }
  return pos;
}

// ===== 初始化粒子 =====
const pos = new Float32Array(N*3);
const col = new Float32Array(N*3);
const target = new Float32Array(N*3);
const spread = new Float32Array(N*3);

const c1 = new THREE.Color('#22d3ee');
const c2 = new THREE.Color('#f97316');
const c3 = new THREE.Color('#a78bfa');
const c4 = new THREE.Color('#34d399');

for (let i = 0; i < N; i++) {
  pos[i*3] = (Math.random()-0.5)*2;
  pos[i*3+1] = (Math.random()-0.5)*2;
  pos[i*3+2] = (Math.random()-0.5)*2;

  const a = Math.random() * Math.PI*2;
  const r = SPREAD_R * (0.5 + Math.random()*0.5);
  spread[i*3] = Math.cos(a)*r;
  spread[i*3+1] = (Math.random()-0.5)*SPREAD_R*0.7;
  spread[i*3+2] = (Math.random()-0.5)*SPREAD_R*0.4;

  const cc = [c1,c2,c3,c4][Math.floor(Math.random()*4)].clone();
  cc.offsetHSL((Math.random()-0.5)*0.1, 0, (Math.random()-0.5)*0.2);
  col[i*3]=cc.r; col[i*3+1]=cc.g; col[i*3+2]=cc.b;
}

const shapePos = getShape('char', N);
for (let i = 0; i < N*3; i++) target[i] = shapePos[i];

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

const mat = new THREE.PointsMaterial({
  size: 0.065, vertexColors: true, transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
});
const pts = new THREE.Points(geo, mat);
scene.add(pts);

// ===== 切换形状 =====
function switchShape(s) {
  shape = s;
  const newPos = getShape(s, N);
  for (let i = 0; i < N*3; i++) target[i] = newPos[i];
}

document.querySelectorAll('[data-shape]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('[data-shape]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    switchShape(b.dataset.shape);
  });
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.body.requestFullscreen();
});

// ===== 鼠标控制 =====
let mouseFist = false;
renderer.domElement.addEventListener('mousedown', () => mouseFist = true);
renderer.domElement.addEventListener('mouseup', () => mouseFist = false);
renderer.domElement.addEventListener('mouseleave', () => mouseFist = false);

const statusEl = document.getElementById('status');
const statusDot = statusEl.querySelector('.dot');

// ===== 摄像头手势检测（简化版） =====
(async function initCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 160, height: 120, facingMode: 'user' } });
    const v = document.createElement('video');
    v.srcObject = stream; v.play();
    statusEl.innerHTML = '<span class="dot green"></span>👋 手势控制中...';

    // 肤色检测（每100ms一次，节约性能）
    function detect() {
      const c = document.createElement('canvas');
      c.width = 80; c.height = 60;
      const ctx = c.getContext('2d');
      try { ctx.drawImage(v, 0, 0, 80, 60); } catch { setTimeout(detect, 100); return; }
      const d = ctx.getImageData(0,0,80,60).data;
      let skin = 0;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        if (r > 70 && g > 40 && b > 20 && r > g && Math.abs(r-g) > 12) skin++;
      }
      // 无手或手张开 → 聚拢；握拳 → 飞散
      if (skin < 30) fist = false;      // 无手 → 聚拢
      else fist = skin < 180;            // 有手：少 = 握拳，多 = 张开
      statusDot.className = 'dot ' + (fist ? 'red' : 'green');
      statusEl.innerHTML = `<span class="dot ${fist?'red':'green'}"></span>${fist ? '🤛 握拳' : skin < 30 ? '👋 未检测到' : '🖐️ 张开'}`;
      setTimeout(detect, 100);
    }
    setTimeout(detect, 500);
  } catch(e) {
    statusEl.innerHTML = '<span class="dot yellow"></span>🖱️ 鼠标控制';
    const btn = document.getElementById('camBtn');
    if (btn) { btn.style.display = ''; btn.onclick = () => { btn.style.display = 'none'; initCam(); }; }
    setInterval(() => { fist = mouseFist; }, 50);
  }
})();

// ===== 窗口 =====
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ===== 动画 =====
let lerp = 0;
function animate() {
  requestAnimationFrame(animate);
  const p = pts.geometry.attributes.position.array;

  const targetLerp = fist ? 1 : 0;
  lerp += (targetLerp - lerp) * LERP_SPEED;
  const e = lerp * lerp * (3 - 2*lerp);

  for (let i = 0; i < N; i++) {
    const i3 = i*3;
    p[i3] = target[i3] + (spread[i3] - target[i3]) * e;
    p[i3+1] = target[i3+1] + (spread[i3+1] - target[i3+1]) * e;
    p[i3+2] = target[i3+2] + (spread[i3+2] - target[i3+2]) * e;
  }
  pts.geometry.attributes.position.needsUpdate = true;
  mat.size = 0.05 + lerp * 0.1;
  pts.rotation.y += 0.003;

  renderer.render(scene, camera);
}
animate();

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
