<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>
  <div id="m" style="width:100%;height:400px"></div>
  <script>
    console.log('L available:', typeof L);
    if (typeof L !== 'undefined') {
      var map = L.map('m', {center: [29.29, 121.43], zoom: 5});
      L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}').addTo(map);
      L.marker([29.29, 121.43]).addTo(map).bindPopup('宁海');
      document.body.innerHTML += '<p style="color:green">✅ 地图加载成功</p>';
    } else {
      document.body.innerHTML += '<p style="color:red">❌ Leaflet 未加载</p>';
    }
  </script>
</body>
</html>
